<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>扫码报名 · 看见压力</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      background: #faf3ea;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 28px;
      padding: 40px 32px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 6px 30px rgba(180, 150, 120, 0.12);
    }
    .card h1 { font-size: 22px; color: #b5896a; margin-bottom: 4px; }
    .card .sub { font-size: 14px; color: #bbb; margin-bottom: 24px; }
    .qr-wrapper {
      background: #fcf8f3;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .qr-wrapper img { width: 240px; height: 240px; display: block; margin: 0 auto; border-radius: 8px; }
    .link-area {
      background: #fcf8f3;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 13px;
      color: #888;
      word-break: break-all;
      margin-bottom: 16px;
      user-select: all;
    }
    .copy-btn {
      display: inline-block;
      padding: 10px 32px;
      background: linear-gradient(135deg, #d4a574, #c9b5a0);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 14px rgba(212, 165, 116, 0.2);
    }
    .copy-btn:active { transform: scale(0.97); }
    .hint { margin-top: 12px; font-size: 12px; color: #ccc; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🍃 看见压力</h1>
    <p class="sub">压力舒缓团体 · 扫码报名</p>
    <div class="qr-wrapper">
      <img id="qrImg" src="" alt="报名二维码">
    </div>
    <div class="link-area" id="shareLink">加载中...</div>
    <button class="copy-btn" onclick="copyLink()">📋 复制链接</button>
    <p class="hint">长按二维码识别 · 或复制链接到浏览器打开</p>
  </div>

  <script>
    const link = window.location.origin;
    document.getElementById('qrImg').src = 'https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=' + encodeURIComponent(link);
    document.getElementById('shareLink').textContent = link;

    function copyLink() {
      navigator.clipboard.writeText(link).then(() => {
        const btn = document.querySelector('.copy-btn');
        btn.textContent = '✓ 已复制';
        setTimeout(() => btn.textContent = '📋 复制链接', 2000);
      });
    }
  </script>
</body>
</html>
